<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Donkey Kong</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:monospace;overflow:hidden;touch-action:none}
canvas{border:2px solid #444;image-rendering:pixelated;background:#000;max-width:100vw;max-height:100vh}
#ui{position:absolute;top:8px;left:50%;transform:translateX(-50%);color:#fff;font-size:clamp(8px,2vw,14px);text-align:center;pointer-events:none;z-index:10;white-space:nowrap}
#ui span{padding:0 16px}
</style>
</head>
<body>
<div id="ui"><span id="scrDisp">SCORE: 00000</span><span id="livDisp">LIVES: 3</span><span id="lvlDisp">LV: 1</span></div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 256, H = 240;
canvas.width = W * 2;
canvas.height = H * 2;
canvas.style.width = W * 2 + 'px';
canvas.style.height = H * 2 + 'px';
ctx.imageSmoothingEnabled = false;

function drawFrame() {
  ctx.save();
  ctx.scale(2, 2);
  render(ctx);
  ctx.restore();
}

// ===== GAME STATE =====
const G = {
  state: 'title',
  score: 0,
  lives: 3,
  level: 1,
  frame: 0,
  timer: 0,
  barrelTimer: 0,
  barrelInterval: 60,
};

// ===== PLAYER =====
const P = {
  x: 40, y: 170, w: 10, h: 14,
  vx: 0, vy: 0,
  dir: 1,
  grounded: false,
  jumping: false,
  frame: 0,
  frameTimer: 0,
  climbTarget: null,
};

// ===== BARRELS =====
let barrels = [];
const MAX_BARRELS = 4;

// ===== GIRDERS =====
// Original-style: platforms with gaps
// y = surface Y, h = thickness
const GIRDER_H = 4;
const GIRDERS = [
  { x: 0,   y: 20,  w: 256, h: GIRDER_H }, // DK platform
  { x: 0,   y: 52,  w: 200, h: GIRDER_H }, // girder 1 (gap on right)
  { x: 56,  y: 84,  w: 200, h: GIRDER_H }, // girder 2 (gap on left)
  { x: 0,   y: 116, w: 170, h: GIRDER_H }, // girder 3 (gap right)
  { x: 86,  y: 148, w: 170, h: GIRDER_H }, // girder 4 (gap left)
  { x: 0,   y: 184, w: 256, h: GIRDER_H }, // bottom platform
];

// ===== RAMPS (for barrels) =====
// Ramps connect girders diagonally
// { x, y, w, h, dir: 1=right-down, -1=left-down }
const RAMPS = [
  { x: 190, y: 20,  w: 66,  h: 32, dir: 1 },
  { x: 0,   y: 52,  w: 66,  h: 32, dir: -1 },
  { x: 190, y: 84,  w: 66,  h: 32, dir: 1 },
  { x: 0,   y: 116, w: 66,  h: 32, dir: -1 },
  { x: 190, y: 148, w: 66,  h: 36, dir: 1 },
];

// ===== DK =====
const DK = { x: 106, y: 2, w: 34, h: 20, frame: 0, timer: 60, animTimer: 0 };

// ===== PAULINE =====
const PAULINE = { x: 195, y: 6, w: 12, h: 16 };

// ===== KEYS =====
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ===== TOUCH / MOBILE =====
let touchX = null, touchY = null, touchId = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  touchX = t.clientX; touchY = t.clientY; touchId = t.identifier;
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) { touchX = t.clientX; touchY = t.clientY; }
  }
}, {passive:false});
canvas.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) { touchX = null; touchY = null; touchId = null; }
  }
}, {passive:false});

function getTouchInput() {
  if (touchX === null) return { left: false, right: false, jump: false };
  const rect = canvas.getBoundingClientRect();
  const rx = (touchX - rect.left) / rect.width;
  const ry = (touchY - rect.top) / rect.height;
  return {
    left: rx < 0.33,
    right: rx > 0.66,
    jump: ry < 0.4,
  };
}

// ===== AUDIO =====
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, dur, type = 'square', vol = 0.12) {
  try {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
function sfxJump() { playTone(520,0.1); setTimeout(()=>playTone(780,0.07),40); }
function sfxDeath() { playTone(200,0.3,'sawtooth',0.18); setTimeout(()=>playTone(120,0.4,'sawtooth',0.18),150); }
function sfxBarrel() { playTone(300,0.05,'square',0.06); }
function sfxPoints() { playTone(880,0.06); playTone(1100,0.06); }

// ===== COLLISION =====
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function platformBelow(x, y, w, h) {
  for (const g of GIRDERS) {
    if (x + w > g.x && x < g.x + g.w) {
      const landY = g.y;
      if (y + h >= landY && y + h <= landY + 7 && y + h >= landY) {
        return { found: true, y: landY };
      }
    }
  }
  return { found: false, y: 0 };
}

function ceilingAbove(x, y, w) {
  for (const g of GIRDERS) {
    if (x + w > g.x && x < g.x + g.w) {
      if (y <= g.y + g.h && y >= g.y - 6 && y < g.y + 2) {
        return { found: true, y: g.y + g.h };
      }
    }
  }
  return { found: false, y: 0 };
}

function onRamp(x, y, w) {
  for (const r of RAMPS) {
    // Simple ramp check - if within ramp horizontal bounds
    if (x + w > r.x && x < r.x + r.w) {
      // Calculate ramp surface Y at this X
      const t = (x - r.x) / r.w;
      const rampY = r.y + t * r.h;
      if (y + 8 >= rampY && y + 8 <= rampY + 8) {
        return r;
      }
    }
  }
  return null;
}

// ===== SPAWN BARREL =====
function spawnBarrel() {
  if (barrels.length >= MAX_BARRELS) return;
  const dir = Math.random() < 0.5 ? 1 : -1;
  barrels.push({
    x: DK.x + 12,
    y: DK.y + 16,
    w: 8, h: 8,
    vx: dir * 0.6,
    vy: 0.3,
    dir: dir,
    frame: 0,
    frameTimer: 0,
    onRamp: false,
  });
  sfxBarrel();
}

// ===== RESET =====
function resetPlayer() {
  P.x = 40;
  P.y = 170;
  P.vx = 0;
  P.vy = 0;
  P.grounded = false;
  P.jumping = false;
  P.frame = 0;
}

function startGame() {
  G.state = 'playing';
  G.score = 0;
  G.lives = 3;
  G.level = 1;
  G.timer = 0;
  G.barrelInterval = 60;
  barrels = [];
  resetPlayer();
  DK.timer = 60;
}

// ===== KILL =====
function killPlayer() {
  G.state = 'dying';
  G.timer = 45;
  sfxDeath();
}

// ===== UPDATE =====
function update() {
  G.frame++;

  if (G.state === 'title') {
    if (keys['Space'] || keys['Enter'] || touchX !== null) {
      initAudio();
      startGame();
      keys['Space'] = false;
      keys['Enter'] = false;
      touchX = null;
    }
    return;
  }

  if (G.state === 'gameover') {
    if (keys['Space'] || keys['Enter'] || touchX !== null) {
      G.state = 'title';
      keys['Space'] = false;
      keys['Enter'] = false;
      touchX = null;
    }
    return;
  }

  if (G.state === 'dying') {
    G.timer--;
    if (G.timer <= 0) {
      G.lives--;
      if (G.lives <= 0) { G.state = 'gameover'; return; }
      resetPlayer();
      barrels = [];
      G.state = 'playing';
    }
    return;
  }

  // ===== PLAYING =====
  const t = getTouchInput();
  let moveX = 0;
  if (keys['ArrowLeft'] || keys['KeyA'] || t.left) moveX = -1;
  if (keys['ArrowRight'] || keys['KeyD'] || t.right) moveX = 1;

  P.vx = moveX * 1.8;
  if (moveX !== 0) P.dir = moveX;

  // Jump
  const jumpKey = keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || t.jump;
  if (jumpKey && P.grounded) {
    P.vy = -4.8;
    P.grounded = false;
    P.jumping = true;
    sfxJump();
  }

  // Gravity
  if (!P.grounded) {
    P.vy += 0.22;
    if (P.vy > 7) P.vy = 7;
  }

  // Move X
  P.x += P.vx;
  if (P.x < 0) P.x = 0;
  if (P.x + P.w > W) P.x = W - P.w;

  // Move Y
  P.y += P.vy;

  // Platform landing
  const plat = platformBelow(P.x, P.y, P.w, P.h);
  if (plat.found && P.vy >= 0) {
    P.y = plat.y - P.h;
    P.vy = 0;
    P.grounded = true;
    P.jumping = false;
    // gently slide off edges
    const g = GIRDERS.find(g => P.x + P.w > g.x && P.x < g.x + g.w && g.y === plat.y);
    if (g) {
      if (P.x < g.x) { P.x = g.x - P.w; }
      if (P.x + P.w > g.x + g.w) { P.x = g.x + g.w; }
    }
  }

  // Head bump
  const ceil = ceilingAbove(P.x, P.y, P.w);
  if (ceil.found && P.vy < 0) {
    P.y = ceil.y;
    P.vy = 0;
  }

  // Fall death
  if (P.y > H + 10) { killPlayer(); return; }

  // Animation
  P.frameTimer++;
  if (P.frameTimer > 5) {
    P.frameTimer = 0;
    P.frame = Math.abs(P.vx) > 0.3 ? (P.frame + 1) % 4 : 0;
  }

  // ===== DK =====
  DK.timer--;
  if (DK.timer <= 0) {
    DK.timer = G.barrelInterval;
    spawnBarrel();
  }

  DK.animTimer++;
  if (DK.animTimer > 12) {
    DK.animTimer = 0;
    DK.frame = (DK.frame + 1) % 2;
  }

  // ===== BARRELS =====
  for (let i = barrels.length - 1; i >= 0; i--) {
    const b = barrels[i];

    // Check if on ramp
    const ramp = onRamp(b.x, b.y, b.w);
    if (ramp) {
      // Follow ramp down
      const t = (b.x - ramp.x) / ramp.w;
      const targetY = ramp.y + t * ramp.h - b.h;
      b.y = targetY;
      b.x += b.dir * 1.2;
      b.vy = 0;
      b.onRamp = true;
    } else {
      b.onRamp = false;
      b.vy += 0.15;
      if (b.vy > 2.5) b.vy = 2.5;
      b.x += b.vx;
      b.y += b.vy;

      // Platform bounce
      const bp = platformBelow(b.x, b.y, b.w, b.h);
      if (bp.found && b.vy >= 0) {
        b.y = bp.y - b.h;
        b.vy = -1.2 - Math.random() * 0.8;
        if (Math.random() < 0.4) { b.dir *= -1; b.vx = b.dir * 0.7; }
      }
    }

    // Wall bounce
    if (b.x < 0) { b.x = 0; b.dir = 1; b.vx = 0.7; }
    if (b.x + b.w > W) { b.x = W - b.w; b.dir = -1; b.vx = -0.7; }

    // Animation
    b.frameTimer++;
    if (b.frameTimer > 4) {
      b.frameTimer = 0;
      b.frame = (b.frame + 1) % 4;
    }

    // Off screen removal
    if (b.y > H + 20 || b.y < -30 || b.x < -30 || b.x > W + 30) {
      if (b.y > H + 5) G.score += 10; // bonus for surviving barrels
      barrels.splice(i, 1);
      continue;
    }

    // Player collision
    if (rectsOverlap(P, b)) { killPlayer(); return; }
  }

  // ===== PROGRESSION =====
  G.timer++;
  if (G.timer > 600) {
    G.timer = 0;
    G.level++;
    G.score += 200;
    G.barrelInterval = Math.max(20, G.barrelInterval - 4);
    sfxPoints();
  }
}

// ===== RENDER =====
function render(ctx) {
  if (G.state === 'title') return renderTitle(ctx);
  drawGame(ctx);
  if (G.state === 'dying' && Math.floor(G.timer / 4) % 2 === 0) {
    ctx.fillStyle = 'rgba(255,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
  }
  if (G.state === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#FF4444';
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', 128, 95);
    ctx.fillStyle = '#fff';
    ctx.font = '8px monospace';
    ctx.fillText('SCORE: ' + G.score, 128, 125);
    ctx.fillText('PRESS SPACE / TAP', 128, 150);
  }
  // HUD
  ctx.fillStyle = '#fff';
  ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + String(G.score).padStart(5,'0'), 6, 9);
  ctx.textAlign = 'right';
  ctx.fillText('LIVES: ' + G.lives, W-6, 9);
  ctx.textAlign = 'center';
  ctx.fillText('LV '+G.level, 128, 9);
}

function renderTitle(ctx) {
  ctx.fillStyle = '#0a0a1e';
  ctx.fillRect(0, 0, W, H);
  // Stars
  for (let i = 0; i < 30; i++) {
    const sx = (i * 37 + 13) % W;
    const sy = (i * 23 + 7) % (H-40) + 20;
    ctx.fillStyle = `rgba(255,255,255,${0.3+Math.sin(G.frame*0.05+i)*0.3})`;
    ctx.fillRect(sx, sy, 2, 2);
  }
  // Title
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('DONKEY KONG', 128, 55);
  ctx.font = '8px monospace';
  ctx.fillStyle = '#FF8C00';
  ctx.fillText('BY NINTENDO', 128, 70);
  // Demo characters
  // Girders
  for (const g of GIRDERS) {
    ctx.fillStyle = g.y > 150 ? '#654321' : '#8B4513';
    ctx.fillRect(g.x, g.y, g.w, g.h);
    ctx.fillStyle = '#CD853F';
    ctx.fillRect(g.x, g.y, g.w, 1);
  }
  drawDK(ctx);
  drawPauline(ctx);
  drawJumpman(ctx, 120, 190, 1, 0);
  // Controls
  ctx.fillStyle = '#fff';
  ctx.fillText('ARROW KEYS / A,D TO MOVE', 128, 160);
  ctx.fillText('SPACE / W / UP TO JUMP', 128, 172);
  ctx.fillStyle = '#0F0';
  if (Math.floor(G.frame / 30) % 2 === 0) {
    ctx.fillText('PRESS SPACE OR TAP TO START', 128, 220);
  }
}

function drawGame(ctx) {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);
  // Girders
  for (const g of GIRDERS) {
    ctx.fillStyle = g.y > 150 ? '#654321' : '#8B4513';
    ctx.fillRect(g.x, g.y, g.w, g.h);
    ctx.fillStyle = '#CD853F';
    ctx.fillRect(g.x, g.y, g.w, 1);
    ctx.fillStyle = '#3a1a00';
    ctx.fillRect(g.x, g.y + g.h - 1, g.w, 1);
    // Rivets
    ctx.fillStyle = '#654321';
    for (let rx = g.x + 4; rx < g.x + g.w - 4; rx += 16) {
      ctx.fillRect(rx, g.y + 1, 2, 2);
    }
  }
  // Ramps (subtle)
  for (const r of RAMPS) {
    ctx.fillStyle = 'rgba(139,69,19,0.15)';
    ctx.beginPath();
    ctx.moveTo(r.x, r.y);
    ctx.lineTo(r.x + r.w, r.y + r.h);
    ctx.lineTo(r.x + r.w, r.y + r.h + 4);
    ctx.lineTo(r.x, r.y + 4);
    ctx.closePath();
    ctx.fill();
  }
  drawDK(ctx);
  drawPauline(ctx);
  for (const b of barrels) drawBarrel(ctx, b);
  drawJumpman(ctx, P.x, P.y, P.dir, P.frame);
}

function drawDK(ctx) {
  const x = DK.x, y = DK.y;
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(x+4, y+6, 26, 14);
  ctx.fillStyle = '#D2691E';
  ctx.fillRect(x+6, y, 22, 10);
  ctx.fillStyle = '#fff';
  ctx.fillRect(x+9, y+3, 5, 4);
  ctx.fillRect(x+20, y+3, 5, 4);
  ctx.fillStyle = '#000';
  ctx.fillRect(x+11, y+4, 3, 3);
  ctx.fillRect(x+22, y+4, 3, 3);
  ctx.fillRect(x+12, y+8, 10, 2);
  ctx.fillStyle = '#8B4513';
  if (DK.frame % 2 === 0) {
    ctx.fillRect(x-2, y+10, 8, 4);
    ctx.fillRect(x+28, y+10, 8, 4);
  } else {
    ctx.fillRect(x-2, y+14, 8, 4);
    ctx.fillRect(x+28, y+14, 8, 4);
  }
  ctx.fillStyle = '#654321';
  ctx.fillRect(x+6, y+18, 9, 4);
  ctx.fillRect(x+21, y+18, 9, 4);
  ctx.fillStyle = '#8B0000';
  ctx.fillRect(x+12, y+10, 10, 6);
}

function drawPauline(ctx) {
  const x = PAULINE.x, y = PAULINE.y;
  ctx.fillStyle = '#FF69B4';
  ctx.fillRect(x+1, y+6, 10, 8);
  ctx.fillStyle = '#FFDAB9';
  ctx.fillRect(x+2, y+1, 8, 7);
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(x+1, y, 10, 3);
  ctx.fillStyle = '#000';
  ctx.fillRect(x+4, y+3, 2, 2);
  ctx.fillRect(x+7, y+3, 2, 2);
  ctx.fillStyle = '#fff';
  ctx.fillRect(x+4, y+6, 6, 2);
  ctx.fillRect(x+5, y+6, 4, 4);
}

function drawJumpman(ctx, x, y, dir, frame) {
  // Hat
  ctx.fillStyle = '#CC0000';
  ctx.fillRect(x+2, y, 7, 3);
  ctx.fillRect(x, y+2, 11, 2);
  // Face
  ctx.fillStyle = '#FFDAB9';
  ctx.fillRect(x+2, y+4, 7, 4);
  // Eye
  ctx.fillStyle = '#000';
  ctx.fillRect(x + (dir===1 ? 6 : 3), y+5, 2, 2);
  // Mustache
  ctx.fillStyle = '#4A2800';
  ctx.fillRect(x+2, y+7, 7, 1);
  // Shirt
  ctx.fillStyle = '#CC0000';
  ctx.fillRect(x+2, y+8, 7, 4);
  // Overalls
  ctx.fillStyle = '#0000CC';
  ctx.fillRect(x+1, y+10, 4, 4);
  ctx.fillRect(x+6, y+10, 4, 4);
  // Arms
  ctx.fillStyle = '#FFDAB9';
  const armOff = (frame % 2 === 0) ? 0 : 2;
  ctx.fillRect(x-1, y+8+armOff, 3, 3);
  ctx.fillRect(x+9, y+8+armOff, 3, 3);
  // Legs/feet
  ctx.fillStyle = '#4A2800';
  if (!P.grounded && P.vy < 0) {
    ctx.fillRect(x+1, y+14, 4, 1);
    ctx.fillRect(x+6, y+14, 4, 1);
  } else {
    ctx.fillRect(x+1, y+14, 4, 3);
    ctx.fillRect(x+6, y+14, 4, 3);
  }
}

function drawBarrel(ctx, b) {
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(b.x+1, b.y, 6, 8);
  ctx.fillStyle = '#654321';
  ctx.fillRect(b.x, b.y+2, 8, 1);
  ctx.fillRect(b.x, b.y+5, 8, 1);
  ctx.fillStyle = '#A0522D';
  ctx.fillRect(b.x+1, b.y+1, 3, 1);
  ctx.fillStyle = '#000';
  ctx.fillRect(b.x+2, b.y+3, 1, 1);
  ctx.fillRect(b.x+5, b.y+6, 1, 1);
}

// ===== LOOP =====
function loop() {
  update();
  drawFrame();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
